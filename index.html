<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Leveling Scorecard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #f0ede8;
    color: #1a1a1a;
    padding: 32px 24px;
  }
  #scorecard {
    max-width: 980px;
    margin: 0 auto;
    font-size: 14px;
  }
  .sc-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 6px;
  }
  .sc-table thead th {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #9a9490;
    padding: 0 6px 10px;
    text-align: center;
  }
  .sc-table thead th:first-child { text-align: left; padding-left: 0; }
  .sc-table tbody tr td { vertical-align: middle; padding: 3px; }
  .sc-table tbody tr td:first-child {
    font-weight: 600;
    font-size: 13px;
    color: #1a1a1a;
    padding: 10px 14px 10px 0;
    width: 200px;
    line-height: 1.35;
  }
  .sc-table tbody tr td:last-child {
    text-align: center;
    font-size: 15px;
    font-weight: 500;
    color: #b0aba5;
    width: 52px;
  }
  .sc-table tbody tr td:last-child.has-score { color: #1a1a1a; }
  .sc-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    background: #f7f5f2;
    border: 1px solid #e2ddd8;
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    font-size: 12px;
    color: #6b6560;
    cursor: pointer;
    line-height: 1.35;
    min-height: 44px;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    font-family: inherit;
    user-select: none;
    -webkit-user-select: none;
  }
  .sc-cell:hover {
    background: #ede9e3;
    border-color: #c9c4be;
  }
  .sc-cell.selected {
    background: #e8f0fe;
    border-color: #a8c4f5;
    color: #1a56db;
    font-weight: 500;
  }
  .sc-footer {
    margin-top: 16px;
    background: #e8e4de;
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .sc-total-block { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
  .sc-total-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #9a9490;
    margin-bottom: 4px;
  }
  .sc-total-score { font-size: 28px; font-weight: 500; color: #1a1a1a; }
  .sc-level-block { flex: 1; min-width: 180px; }
  .sc-level-name { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .sc-level-name.l1 { color: #16a34a; }
  .sc-level-name.l2 { color: #d97706; }
  .sc-level-name.l3 { color: #1a56db; }
  .sc-level-name.l4 { color: #dc2626; }
  .sc-level-empty { font-size: 13px; color: #9a9490; }
  .sc-ranges { font-size: 11px; color: #9a9490; line-height: 1.8; flex: 1; min-width: 180px; }
  .sc-reset {
    background: #f7f5f2;
    border: 1px solid #d6d1cb;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    color: #1a1a1a;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sc-reset:hover { background: #ede9e3; }
  .sc-note { font-size: 11px; color: #9a9490; text-align: center; margin-top: 12px; }
</style>
</head>
<body>
<div id="scorecard">
  <table class="sc-table">
    <thead>
      <tr>
        <th></th>
        <th>1 — Very low</th>
        <th>2 — Low–moderate</th>
        <th>3 — High</th>
        <th>4 — Very high</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="sc-body"></tbody>
  </table>
  <div class="sc-footer">
    <div class="sc-total-block">
      <div class="sc-total-label">Total score</div>
      <div class="sc-total-score" id="sc-total">—</div>
    </div>
    <div class="sc-level-block" id="sc-level">
      <div class="sc-level-empty">Score to see level</div>
    </div>
    <div class="sc-ranges">
      12–18 &rarr; Level 1 — Production<br>
      19–28 &rarr; Level 2 — Campaign<br>
      29–38 &rarr; Level 3 — Strategic<br>
      39–48 &rarr; Level 4 — Transformative
    </div>
    <button class="sc-reset" id="sc-reset-btn">&#8635; Reset</button>
  </div>
  <div class="sc-note">If a project lands on the border &rarr; default up, not down.</div>
</div>

<script>
(function () {
  var dims = [
    { label: "Strategic thinking required", opts: ["Execution only", "Some thinking", "Strategic framing", "Business transformation"] },
    { label: "Creative complexity",          opts: ["Simple edits", "Moderate customization", "Custom concepts", "Foundational system"] },
    { label: "Net-new concepting",           opts: ["None", "Light", "Yes", "Extensive"] },
    { label: "Stakeholder count",            opts: ["2–4", "2–6", "4–6+", "6–10+"] },
    { label: "Decision complexity (BPD)",    opts: ["1", "2–4", "5–6", "7+"] },
    { label: "Decision complexity (client)", opts: ["1–2", "2–4", "5–6", "7+"] },
    { label: "Revision expectation",         opts: ["1–2 rounds", "2–3 rounds", "3–4 rounds", "4+ rounds"] },
    { label: "Timeline pressure",            opts: ["Flexible", "Moderate", "Tight", "Unrealistic"] },
    { label: "Scope volatility risk",        opts: ["Locked", "Some risk", "Likely changes", "Guaranteed"] },
    { label: "Visibility / impact",          opts: ["Low", "Moderate", "High", "Very high"] },
    { label: "PM complexity",                opts: ["Light tracking", "Standard", "Multi-stream", "Program-level"] },
    { label: "Creative staffing level",      opts: ["Maker", "Lead + maker", "CD-led", "Multi-CD / exec"] },
  ];

  var sel = dims.map(function () { return null; });

  function render() {
    var tbody = document.getElementById('sc-body');
    tbody.innerHTML = '';
    dims.forEach(function (dim, i) {
      var tr = document.createElement('tr');

      var tdLabel = document.createElement('td');
      tdLabel.textContent = dim.label;
      tr.appendChild(tdLabel);

      dim.opts.forEach(function (opt, j) {
        var td = document.createElement('td');
        var btn = document.createElement('button');
        btn.className = 'sc-cell' + (sel[i] === j ? ' selected' : '');
        btn.textContent = opt;
        btn.setAttribute('type', 'button');
        (function(ri, ci) {
          btn.addEventListener('click', function () {
            sel[ri] = (sel[ri] === ci) ? null : ci;
            render();
          });
        })(i, j);
        td.appendChild(btn);
        tr.appendChild(td);
      });

      var tdScore = document.createElement('td');
      if (sel[i] !== null) {
        tdScore.className = 'has-score';
        tdScore.textContent = sel[i] + 1;
      } else {
        tdScore.textContent = '—';
      }
      tr.appendChild(tdScore);
      tbody.appendChild(tr);
    });
    update();
  }

  function update() {
    var filled = sel.filter(function (s) { return s !== null; });
    var totalEl = document.getElementById('sc-total');
    var levelEl = document.getElementById('sc-level');
    if (filled.length === 0) {
      totalEl.textContent = '—';
      levelEl.innerHTML = '<div class="sc-level-empty">Score to see level</div>';
      return;
    }
    var total = filled.reduce(function (a, v) { return a + v + 1; }, 0);
    totalEl.textContent = filled.length < dims.length ? total + '*' : total;
    var name, cls;
    if      (total <= 18) { name = 'Level 1 — Production';     cls = 'l1'; }
    else if (total <= 28) { name = 'Level 2 — Campaign';       cls = 'l2'; }
    else if (total <= 38) { name = 'Level 3 — Strategic';      cls = 'l3'; }
    else                  { name = 'Level 4 — Transformative'; cls = 'l4'; }
    var missing = dims.length - filled.length;
    var note = missing > 0
      ? '<div style="font-size:12px;color:#9a9490;margin-top:4px;">' + missing + ' dimension' + (missing > 1 ? 's' : '') + ' not yet scored</div>'
      : '';
    levelEl.innerHTML = '<div class="sc-level-name ' + cls + '">' + name + '</div>' + note;
  }

  document.getElementById('sc-reset-btn').addEventListener('click', function () {
    sel = dims.map(function () { return null; });
    render();
  });

  render();
})();
</script>
</body>
</html>
